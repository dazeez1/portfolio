<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <!--
      Anti-flash: read the persisted theme and set data-theme on <html>
      before first paint, then set the matching background as critical
      inline CSS. Runs synchronously (blocking) so the pre-JS/pre-stylesheet
      paint is ivory (or dark) instead of browser-default white. Hex values
      match --bg light/dark in styles/tokens.css.
    -->
    <script>
      (function () {
        try {
          if (localStorage.getItem("theme") === "dark") {
            document.documentElement.dataset.theme = "dark";
          }
        } catch (e) {}
      })();
    </script>
    <style>
      html {
        background: #faf7f2;
      }
      html[data-theme="dark"] {
        background: #191613;
      }
    </style>
    <link
      rel="preload"
      href="/fonts/inter-variable-normal.woff2"
      as="font"
      type="font/woff2"
      crossorigin
    />
    <link
      rel="preload"
      href="/fonts/fraunces-variable-normal.woff2"
      as="font"
      type="font/woff2"
      crossorigin
    />
    <title>Azeez Damilare Gbenga — Portfolio</title>
    <!--
      Plausible: async, non-blocking (Section 10). data-domain is the
      preferred domain from Project.md (azeezdamilare.com) — this won't
      record real data until that domain is purchased/connected AND a
      matching site exists in a Plausible account. Update data-domain if
      the final domain differs.
    -->
    <script
      defer
      data-domain="azeezdamilare.com"
      src="https://plausible.io/js/script.js"
    ></script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
